name: Release

on:
    push:
        branches: [master]
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to publish (must match package.json, e.g. 3.0.0). Sanity-check only — monoship reads the version from package.json.'
                required: true

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: write
    pull-requests: write
    id-token: write

env:
    PRIMARY_NODE_VERSION: 24

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        steps:
            - name: Release Please
              if: github.event_name == 'push'
              id: release
              uses: googleapis/release-please-action@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set publish flag
              id: flags
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      echo "should_publish=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should_publish=${{ steps.release.outputs.releases_created }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout
              if: steps.flags.outputs.should_publish == 'true'
              uses: actions/checkout@v7

            - name: Install
              if: steps.flags.outputs.should_publish == 'true'
              uses: ./.github/actions/install
              with:
                  node-version: ${{ env.PRIMARY_NODE_VERSION }}
                  registry-url: 'https://registry.npmjs.org'

            - name: Build
              if: steps.flags.outputs.should_publish == 'true'
              uses: ./.github/actions/build

            - name: Publish
              if: steps.flags.outputs.should_publish == 'true'
              uses: tada5hi/monoship@v2

            - name: Coverage
              if: steps.flags.outputs.should_publish == 'true'
              run: |
                  npm run test:coverage

            - name: Upload report
              if: steps.flags.outputs.should_publish == 'true'
              uses: codecov/codecov-action@v6
              with:
                  token: ${{ secrets.codecov }}
                  directory: ./coverage/
