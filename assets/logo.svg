  <path d="M60 8v16a8 8 0 0 0 8 8h16Z" fill="#CBD5E0"/>

  <!-- text lines; the short flame line is the located match -->
  <rect x="34" y="44" width="36" height="7" rx="3.5" fill="#A3AFBC"/>
  <rect x="34" y="58" width="30" height="7" rx="3.5" fill="#A3AFBC"/>
  <rect x="34" y="72" width="34" height="7" rx="3.5" fill="#A3AFBC"/>
  <rect x="34" y="86" width="20" height="7" rx="3.5" fill="url(#flame)"/>

  <!-- magnifying glass -->
  <circle cx="86" cy="86" r="23" fill="#FFA726" fill-opacity="0.14" stroke="url(#flame)" stroke-width="9"/>
  <line x1="103" y1="103" x2="119" y2="119" stroke="url(#flame)" stroke-width="13" stroke-linecap="round"/>
</svg>
